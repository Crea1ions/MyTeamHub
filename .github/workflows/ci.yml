name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  server-tests:
    name: Server tests and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install server dependencies
        run: |
          cd server
          npm ci
      - name: Run tests
        run: |
          cd server
          npm test
      - name: Run npm audit
        run: |
          cd server
          npm audit --audit-level=moderate || true
