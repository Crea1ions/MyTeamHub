name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  server-tests:
    name: Server tests and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install server dependencies
        run: |
          cd server
          npm ci
      - name: Run lint
        run: |
          cd server
          npm ci
          npm run lint || true
      - name: Run tests
        run: |
          cd server
          npm test
      - name: Run coverage (enforces thresholds)
        run: |
          cd server
          npm run coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: coverage/server
      - name: Run npm audit
        run: |
          cd server
          npm audit --audit-level=moderate || true
